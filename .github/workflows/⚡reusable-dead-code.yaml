# ### dotnet-base-reusable-deadcode
# #### source: dotnet-base
name: ⚡ Reusable Dead Code

on:
  workflow_call:

jobs:
  deadcode:
    name: Dead Code
    runs-on:
      - nscloud-ubuntu-22.04-amd64-4x8-with-cache
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-atomi-nix-store-cache-linux-amd64
    steps:
      - uses: AtomiCloud/actions.setup-nix@v3
      - uses: AtomiCloud/actions.cache-nuget@v2
      - name: Run strict dead-code inspection
        run: nix develop .#ci -c ./scripts/ci/dead-code.sh
