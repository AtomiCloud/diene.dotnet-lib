# Coverage uploads are informational. Local merged thresholds are authoritative.
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: auto
        threshold: 1%
        informational: true

flags:
  unit:
    paths:
      - Lib*/
    carryforward: true
  int:
    paths:
      - App*/
    carryforward: true
  meta:
    paths:
      - TestHelper*/
    carryforward: true

comment:
  layout: 'reach, diff, flags, files'
  require_changes: false
