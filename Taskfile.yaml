version: '3'
includes:
  docker: tasks/Taskfile.docker.yaml
  secret: tasks/Taskfile.secret.yaml
  test: tasks/Taskfile.test.yaml
tasks:
  setup:
    desc: Setup the repository
    cmds:
      - ./scripts/local/setup.sh
      - ./scripts/local/secrets.sh
  build:
    desc: Build the .NET solution (Release)
    cmds:
      - dotnet build ./*.slnx -c Release
  run:
    desc: 'Run the sample App in dev mode (args via --, needs `pls up`)'
    cmds:
      - dotnet run --project App/App.csproj -- {{.CLI_ARGS}}
  up:
    desc: Start all local dependencies, detached
    cmds:
      - docker run -d --rm --name dotnet-base-redis -p 6379:6379 redis:8-alpine
  down:
    desc: Stop all local dependencies
    cmds:
      - docker stop dotnet-base-redis 2>/dev/null || true
  lint:
    desc: Lints the whole code-base
    cmds:
      - pre-commit run --all-files
  dead-code:
    desc: Inspect for dead code
    cmds:
      - ./scripts/local/dotnet-dead-code.sh
